<!DOCTYPE html>
<html lang="ps">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نوی استاد اضافه کول</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.form-container{
  background:#fff;
  width:400px;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.form-container h2{
  text-align:center;
  margin-bottom:20px;
  color:#2a5298;
}

.form-group{
  margin-bottom:15px;
}

.form-group label{
  display:block;
  margin-bottom:5px;
  font-weight:bold;
}

.form-group input,
.form-group select{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  outline:none;
  transition:0.3s;
}

.form-group input:focus{
  border-color:#2a5298;
  box-shadow:0 0 5px rgba(42,82,152,0.5);
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#2a5298;
  color:#fff;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1e3c72;
}
</style>

</head>
<body>

<div class="form-container">
  <h2>نوی استاد اضافه کول</h2>

  <form action="#" method="POST">
    <div class="form-group">
      <label>شمېره</label>
      <input type="number" name="teacher_id" placeholder="شمېره" required>
    </div>

    <div class="form-group">
      <label>استاد نوم</label>
      <input type="text" name="teacher_name" placeholder="نوم داخل کړه" required>
    </div>

     <div class="form-group">
      <label>رتبه</label>
      <input type="text" name="teacher_name" placeholder="رتبه" required>
    </div>
    

    <div class="form-group">
      <label>کال</label>
      <input type="number" name="subject" placeholder="کال">
    </div>

    <button type="submit"> استاد ثبت کړی</button>

  </form>
</div>

</body>
</html>
